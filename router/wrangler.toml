name = "glade-router"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

# Production: set CONVERTOR_ORIGIN in the dashboard or `wrangler secret put CONVERTOR_ORIGIN`.
# Local dev: use router/.dev.vars (see .dev.vars.example) — loaded automatically by `wrangler dev`.

routes = [
  { pattern = "gladesystems.uk/*", zone_name = "gladesystems.uk" }
]
