name = "cosmo-proxy"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

# COSMO_ORIGIN must be a hostname (not http://IP:port). Point cosmo.gladesystems.uk A record at your origin.
# Note: cf.resolveOverride cannot substitute a raw IP for an unresolvable fake host — you get 530/1016 (DNS error).

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 100
  period = 60

[vars]
COSMO_ORIGIN = "http://cosmo.gladesystems.uk:5050"
